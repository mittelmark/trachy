name: R

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    
    steps:
      - uses: actions/checkout@v6
      - name: Process and Create Package Structure
        run: |
            sudo apt update && sudo apt upgrade
            sudo apt install r-cran-knitr texlive-latex-base texlive-fonts-recommended
            sudo apt install texlive-fonts-extra texlive-latex-extra

      - name: build package
        run: |
            export VRS=`grep Version: DESCRIPTION | grep -oE '[.0-9]+'`
            echo "VRS=$VRS" >> $GITHUB_ENV
            export PKG=`grep Package: DESCRIPTION | sed -E 's/.+: //'`
            echo "PKG=$PKG" >> $GITHUB_ENV
            Rscript --version
            wget https://github.com/mittelmark/sbi/releases/download/v0.4.2/sbi_0.4.2.tar.gz
            #mkdir ~/R
            sudo R CMD INSTALL sbi_0.4.2.tar.gz
            mkdir release
            cp sbi_0.4.2.tar.gz release/

            #export R_LIBS=$HOME/~/R
            export _R_CHECK_FORCE_SUGGESTS_=0
            #echo "R_LIBS=$R_LIBS" >> $GITHUB_ENV
            make build 
            make check
            cp ${PKG}_${VRS}.tar.gz release/
            ls release
            pwd
            
      - name: Upload Package Release files
        uses: actions/upload-artifact@v6
        with: 
          name: ${{ env.PKG }}_${{ env.VRS }}
          path: release/*
